<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaime Pacheco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <!-- QR code library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #1a2e44;
      --teal:   #4AABB8;
      --teal2:  #3a98a4;
      --bg:     #f0f7f8;
      --white:  #ffffff;
      --muted:  #6b8a9a;
      --border: #c8dfe3;
      --dim:    #a0bbc2;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'Nunito Sans', sans-serif;
      color: var(--navy);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    /* ── Card ── */
    .card {
      background: var(--white);
      width: 100%;
      max-width: 420px;
      padding: 2.8rem 2.6rem 2.4rem;
      position: relative;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(74,171,184,0.10), 0 1px 4px rgba(26,46,68,0.06);
      animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* teal top bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--teal), var(--teal2));
    }

    /* ── QR corner ── */
    .qr-corner {
      position: absolute;
      top: 1.2rem;
      right: 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .qr-box {
      width: 64px;
      height: 64px;
      padding: 4px;
      background: var(--white);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* override qrcode.js canvas/img size */
    .qr-box canvas,
    .qr-box img {
      width: 56px !important;
      height: 56px !important;
    }

    .qr-label {
      font-size: 0.48rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      font-weight: 600;
      text-align: center;
    }

    /* ── Photo ── */
    .photo-wrap {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 1.5rem;
      border: 3px solid var(--white);
      outline: 2px solid var(--teal);
      box-shadow: 0 4px 16px rgba(74,171,184,0.20);
      animation: rise 0.8s 0.08s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* ── Name & role ── */
    .name {
      font-family: 'Lora', serif;
      font-weight: 500;
      font-size: 1.65rem;
      letter-spacing: 0.01em;
      text-align: center;
      color: var(--navy);
      line-height: 1.1;
      animation: rise 0.8s 0.12s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .role {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--teal);
      text-align: center;
      margin-top: 0.5rem;
      animation: rise 0.8s 0.16s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin: 1.6rem 0;
      animation: rise 0.8s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider-dot {
      width: 6px;
      height: 6px;
      background: var(--teal);
      border-radius: 50%;
    }

    /* ── Links ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      animation: rise 0.8s 0.24s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .link-row {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      text-decoration: none;
      color: var(--navy);
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      transition: border-color 0.2s, background 0.2s, transform 0.18s;
      position: relative;
      overflow: hidden;
    }

    .link-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--teal);
      transform: scaleY(0);
      transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1);
      transform-origin: bottom;
    }

    .link-row:hover {
      border-color: var(--teal);
      background: #e8f5f7;
      transform: translateX(3px);
    }

    .link-row:hover::before { transform: scaleY(1); }

    .link-row svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
      color: var(--teal);
    }

    .link-text {
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      line-height: 1.4;
      color: var(--navy);
    }

    .link-label {
      display: block;
      font-size: 0.57rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.12rem;
      font-weight: 600;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      animation: rise 0.8s 0.32s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .footer-dot {
      width: 3px;
      height: 3px;
      background: var(--teal);
      border-radius: 50%;
    }

    .footer span {
      font-size: 0.57rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- QR corner -->
  <div class="qr-corner">
    <div class="qr-box" id="qrcode"></div>
    <span class="qr-label">Guardar contacto</span>
  </div>

  <div class="photo-wrap">
    <img src="photo.jpg" alt="Jaime Pacheco" />
  </div>

  <h1 class="name">Jaime Pacheco</h1>
  <p class="role">KAM Chile</p>

  <div class="divider"><div class="divider-dot"></div></div>

  <div class="links">

    <a class="link-row" href="mailto:Jaime.pacheco_martinez@givaudan.com">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M2 7l10 7 10-7"/>
      </svg>
      <span class="link-text">
        <span class="link-label">Email</span>
        Jaime.pacheco_martinez@givaudan.com
      </span>
    </a>

    <a class="link-row" href="https://www.linkedin.com/in/jaime-pacheco/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="3"/>
        <path d="M7 10v7M7 7v.01M12 17v-4a2 2 0 014 0v4M12 10v7"/>
      </svg>
      <span class="link-text">
        <span class="link-label">LinkedIn</span>
        linkedin.com/in/jaime-pacheco
      </span>
    </a>

    <a class="link-row" href="https://ddwcolor.com/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/>
      </svg>
      <span class="link-text">
        <span class="link-label">Webpage</span>
        Givaudan · Sense Colour
      </span>
    </a>

  </div>

  <div class="footer">
    <div class="footer-dot"></div>
    <span>Givaudan Sense Colour</span>
    <div class="footer-dot"></div>
    <span>LATAM</span>
    <div class="footer-dot"></div>
  </div>
</div>

<script>
  // vCard 3.0 — al escanear el QR, el celular ofrece guardar el contacto
  const vcard = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    "FN:Jaime Pacheco",
    "N:Pacheco;Jaime;;;",
    "TITLE:KAM Chile",
    "ORG:Givaudan Sense Colour",
    "EMAIL;TYPE=WORK:Jaime.pacheco_martinez@givaudan.com",
    "URL;TYPE=LinkedIn:https://www.linkedin.com/in/jaime-pacheco/",
    "URL;TYPE=WORK:https://ddwcolor.com/",
    "END:VCARD"
  ].join("\n");

  new QRCode(document.getElementById("qrcode"), {
    text: vcard,
    width: 56,
    height: 56,
    colorDark: "#1a2e44",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });
</script>

</body>
</html>
